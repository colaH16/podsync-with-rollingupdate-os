name: Docker Publish

on:
  workflow_dispatch:
  schedule:
    # Every Sunday 04:00 KST = Saturday 19:00 UTC
    - cron: "0 19 * * 6"
  push:
    branches: ["main"]
    paths:
      - "Dockerfile"
      - ".github/workflows/docker-publish.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PODSYNC_VERSION: v2.8.0

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write
      # This is used to push GitHub artifact attestations.
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Required for multi-platform builds, especially linux/arm64 on GitHub runners.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Buildx is required for multi-platform images and GitHub Actions cache.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GitHub Container Registry using the automatic GitHub token.
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Used for the weekly immutable tag.
      - name: Set build date
        id: date
        run: echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      # Generate Docker image tags and OCI labels.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.PODSYNC_VERSION }}
            type=raw,value=${{ env.PODSYNC_VERSION }}-latest
            type=raw,value=${{ env.PODSYNC_VERSION }}-${{ steps.date.outputs.date }}
            type=sha,prefix=${{ env.PODSYNC_VERSION }}-sha-

      # Build and push the multi-architecture image.
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Generate a provenance attestation for the pushed image.
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true
