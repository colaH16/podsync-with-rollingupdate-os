name: Docker Publish

on:
  workflow_dispatch:
  schedule:
    # Every Sunday 04:00 KST = Saturday 19:00 UTC
    - cron: "0 19 * * 6"
  push:
    branches: ["main"]
    paths:
      - "Dockerfile"
      - ".github/workflows/docker-publish.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PODSYNC_VERSION: v2.8.0

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write
      # This is used to push GitHub artifact attestations.
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Inspect runner network
        run: |
          echo "Public IP:"
          curl -fsSL https://ifconfig.me
          echo
          echo "Geo:"
          curl -fsSL https://ipinfo.io/json || true
          echo
          echo "openSUSE DNS:"
          getent hosts download.opensuse.org || true
          
      - name: Resolve build versions
        id: versions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          podsync_version="$(gh api repos/mxpv/podsync/releases/latest --jq '.tag_name')"
          deno_version="$(gh api repos/denoland/deno/releases/latest --jq '.tag_name' | sed 's/^v//')"
          build_date="$(date -u +%Y%m%d)"
          image_repo="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          version_tag="${podsync_version}-deno${deno_version}"
          candidate_image="${image_repo}:${version_tag}"

          echo "podsync_version=$podsync_version" >> "$GITHUB_OUTPUT"
          echo "deno_version=$deno_version" >> "$GITHUB_OUTPUT"
          echo "build_date=$build_date" >> "$GITHUB_OUTPUT"
          echo "image_repo=$image_repo" >> "$GITHUB_OUTPUT"
          echo "version_tag=$version_tag" >> "$GITHUB_OUTPUT"
          echo "candidate_image=$candidate_image" >> "$GITHUB_OUTPUT"

          echo "Podsync version: $podsync_version"
          echo "Deno version: $deno_version"
          echo "Image repo: $image_repo"
          echo "New candidate image: $candidate_image"

      - name: Check whether candidate image already exists
        id: existing
        run: |
          candidate_image="${{ steps.versions.outputs.candidate_image }}"

          echo "New candidate image: $candidate_image"

          if docker buildx imagetools inspect "$candidate_image" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Candidate image already exists. Build will be skipped."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Candidate image does not exist. Build will run."
          fi

      - name: Extract Docker metadata
        if: steps.existing.outputs.exists != 'true' || github.event_name == 'workflow_dispatch'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.versions.outputs.image_repo }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.versions.outputs.podsync_version }}-latest
            type=raw,value=${{ steps.versions.outputs.version_tag }}
            type=raw,value=${{ steps.versions.outputs.build_date }}-${{ steps.versions.outputs.version_tag }}

            
      - name: Build and push Docker image
        if: steps.existing.outputs.exists != 'true' || github.event_name == 'workflow_dispatch'
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}
          file: ${{ github.workspace }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            PODSYNC_VERSION=${{ steps.versions.outputs.podsync_version }}
            DENO_VERSION=${{ steps.versions.outputs.deno_version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        if: steps.existing.outputs.exists != 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true
          